<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moeky Aung - Multi-Tech Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        body { font-family: 'Inter', sans-serif; }
        .hero { background: var(--primary); color: white; padding: 150px 0; }
        .tech-card { 
            height: 250px; border: none; border-radius: 20px; 
            transition: all 0.4s; cursor: pointer; overflow: hidden;
        }
        .tech-card:hover { transform: translateY(-15px); box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        .tech-icon { font-size: 4rem; margin-bottom: 1rem; }
        .demo-links { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); }
        .demo-links a { margin: 0 5px; opacity: 0; transition: opacity 0.3s; }
        .tech-card:hover .demo-links a { opacity: 1; }
    </style>
</head>
<body>
    <section class="hero text-center text-white">
        <div class="container">
            <h1 class="display-3 fw-bold mb-4">Moeky Aung</h1>
            <p class="lead mb-5 fs-3">Full Stack Developer • Open Source Contributor</p>
            <p class="fs-5 mb-5">Choose your favorite technology stack:</p>
        </div>
    </section>

    <section class="py-5">
        <div class="container">
            <div class="row g-4">
                <div class="col-lg-3 col-md-6">
                    <a href="./docs/vanilla/" class="tech-card text-decoration-none text-dark bg-white">
                        <div class="card-body d-flex flex-column align-items-center justify-content-center h-100 p-4">
                            <div class="tech-icon"><i class="fas fa-code"></i></div>
                            <h3>Vanilla</h3>
                            <p class="text-muted mb-0">HTML/CSS/JS</p>
                            <div class="demo-links">
                                <a href="./docs/vanilla/" class="btn btn-outline-primary btn-sm"><i class="fas fa-eye"></i></a>
                                <a href="./docs/vanilla/src.zip" class="btn btn-outline-secondary btn-sm"><i class="fas fa-download"></i></a>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="col-lg-3 col-md-6">
                    <a href="./docs/bootstrap/" class="tech-card text-decoration-none text-dark bg-white">
                        <div class="card-body d-flex flex-column align-items-center justify-content-center h-100 p-4">
                            <div class="tech-icon"><i class="fab fa-bootstrap"></i></div>
                            <h3>Bootstrap 5</h3>
                            <p class="text-muted mb-0">Responsive UI</p>
                            <div class="demo-links">
                                <a href="./docs/bootstrap/" class="btn btn-outline-primary btn-sm"><i class="fas fa-eye"></i></a>
                                <a href="./docs/bootstrap/src.zip" class="btn btn-outline-secondary btn-sm"><i class="fas fa-download"></i></a>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="col-lg-3 col-md-6">
                    <a href="./docs/react/" class="tech-card text-decoration-none text-dark bg-white">
                        <div class="card-body d-flex flex-column align-items-center justify-content-center h-100 p-4">
                            <div class="tech-icon"><i class="fab fa-react"></i></div>
                            <h3>React 18</h3>
                            <p class="text-muted mb-0">Component-based</p>
                            <div class="demo-links">
                                <a href="./docs/react/" class="btn btn-outline-primary btn-sm"><i class="fas fa-eye"></i></a>
                                <a href="./src/react.zip" class="btn btn-outline-secondary btn-sm"><i class="fas fa-download"></i></a>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="col-lg-3 col-md-6">
                    <a href="./docs/vue/" class="tech-card text-decoration-none text-dark bg-white">
                        <div class="card-body d-flex flex-column align-items-center justify-content-center h-100 p-4">
                            <div class="tech-icon"><i class="fab fa-vuejs"></i></div>
                            <h3>Vue 3</h3>
                            <p class="text-muted mb-0">Reactive UI</p>
                            <div class="demo-links">
                                <a href="./docs/vue/" class="btn btn-outline-primary btn-sm"><i class="fas fa-eye"></i></a>
                                <a href="./src/vue.zip" class="btn btn-outline-secondary btn-sm"><i class="fas fa-download"></i></a>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
